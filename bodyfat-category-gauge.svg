<svg width="600" height="320" viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="320" fill="#0d1117" rx="14"/>
  <text x="300" y="30" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="15" fill="#00d4ff" font-weight="bold">Body Fat % Category Gauge (illustrative)</text>

  <g transform="translate(0,10)">
    <!-- 5 colored arc bands -->
    <path d="M140,220 A160,160 0 0,1 170.6,126.0" fill="none" stroke="#10b981" stroke-width="34"/>
    <path d="M170.6,126.0 A160,160 0 0,1 250.6,67.8" fill="none" stroke="#00d4ff" stroke-width="34"/>
    <path d="M250.6,67.8 A160,160 0 0,1 349.4,67.8" fill="none" stroke="#f59e0b" stroke-width="34"/>
    <path d="M349.4,67.8 A160,160 0 0,1 429.4,126.0" fill="none" stroke="#f97316" stroke-width="34"/>
    <path d="M429.4,126.0 A160,160 0 0,1 460,220" fill="none" stroke="#ef4444" stroke-width="34"/>

    <!-- needle -->
    <g>
      <line x1="300" y1="220" x2="170" y2="220" stroke="#ffffff" stroke-width="5" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" values="0 300 220;-170 300 220;-65 300 220" keyTimes="0;0.65;1" dur="3.2s" fill="freeze"/>
      </line>
      <circle cx="300" cy="220" r="10" fill="#ffffff"/>
    </g>

    <!-- readout -->
    <text x="300" y="260" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="26" fill="#ffffff" font-weight="bold" opacity="0">
      15.4%
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.65;1" dur="3.2s" fill="freeze"/>
    </text>
    <text x="300" y="282" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="11" fill="#9ca3af" opacity="0">
      Fitness range (male, demo value)
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.65;1" dur="3.2s" fill="freeze"/>
    </text>
  </g>

  <g font-family="Verdana, Arial, sans-serif" font-size="10" fill="#e5e7eb">
    <rect x="30" y="300" width="10" height="10" fill="#10b981"/><text x="45" y="309">Essential</text>
    <rect x="130" y="300" width="10" height="10" fill="#00d4ff"/><text x="145" y="309">Athletic</text>
    <rect x="225" y="300" width="10" height="10" fill="#f59e0b"/><text x="240" y="309">Fitness</text>
    <rect x="315" y="300" width="10" height="10" fill="#f97316"/><text x="330" y="309">Average</text>
    <rect x="415" y="300" width="10" height="10" fill="#ef4444"/><text x="430" y="309">Obese</text>
  </g>
</svg>
